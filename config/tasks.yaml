research_task:
  description: >
    Você recebeu uma lista de tecnologias: {ferramentas_alvo}.
    Sua missão é realizar uma varredura técnica completa para CADA uma delas.
    
    PROTOCOLO DE EXECUÇÃO:
    1. Identifique individualmente cada tecnologia em {ferramentas_alvo}.
    2. Execute ao menos uma busca específica para cada tecnologia separadamente.
    3. Para cada ferramenta, extraia: Licença, Arquitetura base, e paridade S3.
    4. Se os resultados de uma busca focarem apenas em uma ferramenta, você DEVE realizar uma nova busca focada na ferramenta restante.
    
    REGRA CRÍTICA: Não encerre a tarefa até ter dados factuais sobre todos os itens de {ferramentas_alvo}.
    Proibido saudações. Comece com "## Relatório de Pesquisa Técnica".
  expected_output: >
    Relatório comparativo em Markdown contendo seções específicas para cada uma das {ferramentas_alvo}.
  agent: researcher

audit_task:
  description: >
    Com base na pesquisa, analise como {ferramentas_alvo} se comportam em um ambiente de produção.
    Avalie o risco de vendor lock-in e os trade-offs de performance para workloads padrão.
    Identifique qual ferramenta exige menos esforço operacional para substituir a solução legada ({ferramenta_legada}).
  expected_output: Análise de trade-offs operacionais e adequação ao ecossistema corporativo.
  agent: sre_auditor

write_task:
  description: >
    Crie o artigo técnico definitivo comparando {ferramentas_alvo}. 
    Use os dados de arquitetura (FSSD, Master-Worker, DHT) e licenças levantados.
    
    REQUISITOS DE ESTILO E CONTEÚDO:
    1. Conexão e Empatia (Storytelling): Inicie em primeira pessoa. Relate as "raivas" e dores reais enfrentadas com {ferramenta_legada} devido a {contexto}. Crie uma linha cronológica rápida de como o problema surgiu para gerar conexão com o leitor.
    2. Alinhamento: Deixe claro logo no início qual é o público-alvo e o que será abordado tecnicamente, evitando frustrações.
    3. Desenvolvimento Explicativo: Escreva como se estivesse explicando as ferramentas para um colega SRE sentado à sua frente. Use suas próprias palavras e opiniões para explicar a arquitetura pesada.
    4. Analise o impacto real no Dia 2 (rebalanceamento, vendor lock-in, RAM) usando tabelas para comparações diretas.
    5. Personalidade: Não tente ser neutro. O diferencial do artigo é a sua visão técnica sobre as soluções.
  expected_output: >
    Artigo em Markdown altamente engajador e formatado para o Medium.
    ESTRUTURA OBRIGATÓRIA:
    - Título / Subtítulo (Concisos)
    - Introdução: A História e a Dor (Storytelling sobre o legado)
    - O Que Vamos Abordar (Alinhamento de expectativa)
    - Deep Dive Arquitetural (Explicação técnica com toque pessoal)
    - Operação de Dia 2: Trade-offs (Uso de tabelas)
    - Conclusão e CTA (Sua recomendação fundamentada e convite para comentários)
  agent: writer

validation_task:
  description: >
    Faça a revisão final do artigo gerado. 
    Sua única missão é garantir a verdade técnica sem destruir o estilo do autor:
    1. Se o escritor errou uma licença ou conceito de arquitetura, corrija o fato diretamente no corpo do artigo.
    2. REGRA DE PRESERVAÇÃO: Mantenha intactos o storytelling, a escrita em primeira pessoa, as opiniões e a empatia. Não remova a personalidade do texto.
    3. Remova apenas informações técnicas falsas, alucinações ou invenções operacionais.
    4. Consolide o texto em um arquivo único, sem repetições.
  expected_output: >
    Artigo final em Markdown, tecnicamente impecável, preservando o tom de voz do autor, sem notas de rodapé ou comentários de auditoria.
  agent: fact_checker