research_task:
  description: >
    PROTOCOLO DE EXTRAÇÃO SISTEMÁTICA E PESQUISA DIRECIONADA:
    
    Para CADA ferramenta em {ferramentas_alvo}, você DEVE encontrar links de documentações oficiais e discussões técnicas avançadas.
    Faça consultas específicas usando a ferramenta, como:
    - "[Nome da Ferramenta] resource limits constraints official documentation"
    - "[Nome da Ferramenta] pricing egress network hidden costs"
    
    Extraia dos resultados:
    - Arquitetura técnica real (focada em infraestrutura, não marketing).
    - Limitações numéricas conhecidas (quotas, limites de concorrência).
    - Fontes rastreáveis (URLs exatas).
    
    CONTEXTO: {requisito_tecnico}
    
    REGRAS ABSOLUTAS:
    - Use APENAS a tool 'Search SerpAPI' para buscar informações.
    - PROIBIDO inventar ferramentas. NUNCA tente chamar 'final_answer', 'snowflake' ou 'function_name'.
    - Quando tiver os links e resumos, escreva a saída final imediatamente.
    - Se uma informação exata (ex: custo de egress) não for encontrada após 3 buscas, registre os links oficiais encontrados e avance. Não entre em loop.
    - Apenas fatos verificáveis. Zero introduções e zero conclusões.

  expected_output: >
    Texto em markdown listando links oficiais e os fatos técnicos encontrados nos resumos da busca.
    Exemplo:
    
    ## [Nome da Ferramenta]
    - Arquitetura: [descrição baseada na busca]
    - Limitações: [lista de limites encontrados ou "Não detalhado nos resultados"]
    - Fontes: [urls]

deep_extraction_task:
  description: >
    Utilize a 'SeleniumScrapingTool' para acessar os links encontrados na task anterior.
    
    REGRA ANTI-LOOP (CRÍTICA): 
    - Escolha APENAS os 5 links mais promissores por ferramenta.
    - NUNCA acesse o mesmo link duas vezes. 
    - Após ler 3 links diferentes, PARE de usar a ferramenta de leitura e escreva o seu relatório final imediatamente.
    
    Você DEVE extrair dados numéricos e técnicos específicos sobre {ferramentas_alvo}:
    1. Limites de concorrência e quotas de API.
    2. Custos de transferência de dados (egress) e armazenamento.
    3. Detalhes de arquitetura (ex: micro-particionamento).
    
    Se não encontrar a informação em 3 links, apenas escreva "Não encontrado" e siga em frente.
  expected_output: >
    Um relatório técnico cru contendo tabelas de limites e valores extraídos dos sites lidos.
  agent: researcher
  context: [research_task]

structure_task:
  description: >
    Transforme os dados brutos de pesquisa em JSON estruturado.
    
    Para cada ferramenta identificada na pesquisa, crie um objeto com:
    - ferramenta: nome da ferramenta (string)
    - arquitetura: descrição da arquitetura (string)
    - limitacoes_conhecidas: lista de limitações (array de strings)
    - fontes: lista de URLs (array de strings)
    
    REGRAS CRÍTICAS DE JSON:
    - Use APENAS aspas duplas (") para strings
    - NUNCA use backticks (`) ou aspas simples (')
    - NUNCA use formatação markdown dentro das strings
    - Escreva texto plano sem formatação especial
    - Exemplo CORRETO: "limitacoes_conhecidas": ["A ferramenta X tem limite de configuracao"]
    - Exemplo ERRADO: "limitacoes_conhecidas": ["A ferramenta X tem `limit` configuracao"]
    
    REGRAS DE FORMATAÇÃO:
    - NÃO escreva introduções ou explicações
    - NÃO use markdown code blocks
    - Escreva APENAS o objeto JSON puro
    - Sua resposta deve começar com { e terminar com }

  expected_output: >
    JSON puro sem backticks, sem markdown, sem formatação especial:
    {"fatos":[{"ferramenta":"Ferramenta_Exemplo","arquitetura":"descricao","limitacoes_conhecidas":["limitacao 1","limitacao 2"],"fontes":["url1","url2"]}]}

audit_task:
  description: >
    ANÁLISE OPERACIONAL PARA USO PRÓPRIO
    
    Dado o contexto: {contexto}
    
    Analise os dados estruturados e produza JSON com:
    
    1. vencedor_operacional: string com o nome da ferramenta vencedora
    2. riscos_sre: array de strings com riscos identificados
    3. custos_ocultos_finops: array de strings com custos ocultos
    4. recomendacao_final: string com a decisão técnica
    
    CRITÉRIOS:
    - Foco prático. Tome partido e escolha a melhor opção para rodar na sua infraestrutura.
    - Avalie observabilidade, manutenibilidade e escalabilidade real.
    - O que pode acordar o time às 3h.
    
    REGRAS CRÍTICAS DE FORMATAÇÃO E TIPAGEM:
    - VOCÊ NÃO TEM NENHUMA TOOL DISPONÍVEL.
    - PROIBIDO CRIAR DICIONÁRIOS INTERNOS. As chaves de arrays devem conter apenas STRINGS simples.
    - ERRADO: "riscos_sre": [{"risco": "falha"}]
    - CORRETO: "riscos_sre": ["falha de memoria", "timeout"]
    - NÃO escreva qualquer introdução.
    - NÃO use markdown code blocks (sem ```).
    - Escreva APENAS o objeto JSON puro. Sua resposta deve começar com { e terminar com }.

  expected_output: >
    {"vencedor_operacional":"Nome da ferramenta","riscos_sre":["risco 1","risco 2"],"custos_ocultos_finops":["custo 1","custo 2"],"recomendacao_final":"Decisão técnica fundamentada"}